<!doctype html>
<html lang="es-UY">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cliniq — Inteligencia automatizada para tu clínica</title>

  <!-- Fonts: Geist (sans + mono) + Instrument Serif for editorial italic accents -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['Geist Mono', 'ui-monospace', 'monospace'],
            serif: ['Instrument Serif', 'ui-serif', 'serif'],
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --cq-bg: oklch(0.985 0.006 220);
      --cq-surface: oklch(1 0 0);
      --cq-surface-2: oklch(0.97 0.008 220);
      --cq-surface-3: oklch(0.94 0.010 220);
      --cq-fg: oklch(0.32 0.025 235);
      --cq-fg-muted: oklch(0.55 0.018 230);
      --cq-border: oklch(0.91 0.010 220);
      --cq-accent: oklch(0.58 0.08 195);
      --cq-accent-soft: oklch(0.95 0.025 195);
      --cq-success: oklch(0.60 0.09 160);
      --cq-warn: oklch(0.68 0.10 80);
      --cq-danger: oklch(0.58 0.11 25);
    }
    html, body {
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      background: var(--cq-bg);
      color: var(--cq-fg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: 'ss01', 'cv11';
    }
    * { font-feature-settings: inherit; }
    .font-mono, [class*="font-mono"] { font-family: 'Geist Mono', ui-monospace, monospace; }
    ::selection { background: var(--cq-accent); color: white; }
    html { scroll-behavior: smooth; }
    body { text-wrap: pretty; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--cq-border); border-radius: 10px; border: 2px solid var(--cq-bg); }
    ::-webkit-scrollbar-thumb:hover { background: var(--cq-fg-muted); }

    @keyframes cqModalIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react" src="src/tokens.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/landing.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/login.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/dashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/app.jsx"></script>
</body>
</html>
